# ──────────────────────────────────────────────────────────────────────────────
# FrameX — PR Preview Comment
# Adds a comment on every PR with the preview deployment URL
# ──────────────────────────────────────────────────────────────────────────────

name: PR Preview Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  comment:
    name: Post Preview URL
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- framex-preview -->'

      - name: Create or update preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- framex-preview -->
            ## 🚀 FrameX Preview Deployment

            | | URL |
            |---|---|
            | **Preview** | https://${{ github.head_ref }}.framex.pages.dev |
            | **Branch** | `${{ github.head_ref }}` |
            | **Commit** | `${{ github.event.pull_request.head.sha }}` |

            > ⏳ Deployment is being built. The URL will be live in ~2 minutes.
