# ──────────────────────────────────────────────────────────────────────────────
# FrameX — CI/CD: Build + Deploy to Cloudflare Pages
# Uses @cloudflare/next-on-pages to transpile Next.js for Cloudflare Workers
#
# REQUIRED SECRETS (GitHub → Settings → Secrets → Actions):
#   CLOUDFLARE_API_TOKEN      Pages:Edit + Account:Read
#   CLOUDFLARE_ACCOUNT_ID     From Cloudflare dashboard URL
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   NEXT_PUBLIC_SITE_URL      e.g. https://framex.pages.dev
# ──────────────────────────────────────────────────────────────────────────────

name: 🚀 Deploy FrameX

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 1: Lint + Type-check ─────────────────────────────────────────────────
  quality:
    name: 🔍 Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

  # ── Job 2: Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: 📦 Build & Deploy
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    outputs:
      deployment-url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      # Cache Next.js build artifacts between runs
      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      # ── Deploy production (main branch push) ─────────────────────────────────
      - name: 🌐 Deploy → Production
        id: deploy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: framex
          directory: .next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      # ── Deploy preview (develop branch or PR) ────────────────────────────────
      - name: 👁️ Deploy → Preview
        id: deploy-preview
        if: github.ref != 'refs/heads/main' || github.event_name == 'pull_request'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: framex
          directory: .next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref_name }}

      # ── Post preview URL on PR ────────────────────────────────────────────────
      - name: 💬 Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy-preview.outputs.url }}' || 'Building…';
            const body = `## 🚀 Preview Deployment Ready\n\n| | |\n|---|---|\n| **URL** | ${url} |\n| **Branch** | \`${{ github.head_ref }}\` |\n| **Commit** | \`${{ github.event.pull_request.head.sha }}\` |`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── Job 3: Post-deploy health check ─────────────────────────────────────────
  healthcheck:
    name: ✅ Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait 30s for propagation
        run: sleep 30

      - name: Check homepage
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" https://framex.pages.dev/vi)
            echo "Attempt $i — HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ OK" && exit 0
            sleep 15
          done
          echo "❌ Health check failed"
          exit 1

      - name: Check API
        run: |
          STATUS=$(curl -sL -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"name":"healthcheck"}' \
            https://framex.pages.dev/api/contact)
          echo "API status: $STATUS"
          # 400 is fine (validation failed) — means the route is alive
          [ "$STATUS" != "000" ] && echo "✅ API alive" || exit 1
